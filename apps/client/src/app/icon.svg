<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" /> <!-- tailwind sky-500 -->
      <stop offset="100%" stop-color="#2dd4bf" /> <!-- tailwind teal-400 -->
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0284c7" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Container -->
  <rect width="256" height="256" rx="64" fill="url(#primaryGrad)"/>

  <!-- High-Tech Tooth -->
  <path d="M128 60 C88 60 56 80 56 124 C56 160 81 210 100 210 C116 210 128 170 128 170 C128 170 140 210 156 210 C175 210 200 160 200 124 C200 80 168 60 128 60 Z" fill="#ffffff" filter="url(#shadow)"/>
  
  <!-- AI Dot/Sparkle -->
  <circle cx="128" cy="110" r="14" fill="#0ea5e9"/>
</svg>
