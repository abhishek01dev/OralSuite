version: '3.9'

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfiles/api.Dockerfile
    container_name: saas-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mysql://root:${MYSQL_PASSWORD:-password}@mysql:3306/${MYSQL_DATABASE:-saas_db}
      - MONGODB_URI=mongodb://mongodb:27017/${MYSQL_DATABASE:-saas_db}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - saas-network
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      retries: 3

  admin:
    build:
      context: ..
      dockerfile: docker/Dockerfiles/admin.Dockerfile
    container_name: saas-admin
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://api:3000
    depends_on:
      - api
    networks:
      - saas-network

  client:
    build:
      context: ..
      dockerfile: docker/Dockerfiles/client.Dockerfile
    container_name: saas-client
    restart: unless-stopped
    ports:
      - '3002:3002'
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://api:3000
    depends_on:
      - api
    networks:
      - saas-network

  mysql:
    image: mysql:8.0
    container_name: saas-mysql
    restart: unless-stopped
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-saas_db}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - saas-network
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  mongodb:
    image: mongo:7
    container_name: saas-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    networks:
      - saas-network

  redis:
    image: redis:7-alpine
    container_name: saas-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - saas-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: saas-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - admin
      - client
    networks:
      - saas-network

volumes:
  mysql-data:
  mongo-data:
  redis-data:

networks:
  saas-network:
    driver: bridge
